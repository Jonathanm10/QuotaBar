<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>QuotaBar · Runway</title>
<style>
  :root{
    --bg:#0a0b0e;--panel:#12141a;--line:#1f222a;
    --ink:#f4f5f7;--ink2:#9aa3af;--ink3:#6b7280;
    --ok:#34d399;--warn:#fbbf24;--crit:#f87171;
    --accent:#a78bfa;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(800px 400px at 80% -20%, #1a1327 0%, transparent 60%),
      radial-gradient(800px 400px at -10% 120%, #0c1d22 0%, transparent 60%),
      var(--bg);
    color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:32px;
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;
  }
  .frame{
    width:380px;border-radius:18px;overflow:hidden;
    background:linear-gradient(180deg,#10121a,#0a0c12);
    border:1px solid var(--line);
    box-shadow:0 40px 80px rgba(0,0,0,.6);
  }
  .head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .title{font-weight:600}
  .tag{font-size:10px;color:var(--ink3);letter-spacing:.8px}
  .spacer{flex:1}
  .tab{background:transparent;border:0;color:var(--ink3);padding:6px 10px;border-radius:999px;cursor:pointer;font:inherit;font-size:12px}
  .tab.on{background:#1b1e28;color:var(--ink)}

  .body{padding:18px}
  .hero{
    display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 0 10px;
  }
  .hero .top{display:flex;align-items:baseline;gap:8px}
  .hero .big{
    font-size:58px;font-weight:700;letter-spacing:-2px;line-height:1;
    font-variant-numeric:tabular-nums;
    background:linear-gradient(180deg,#fff,#bfc4cc);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .hero .unit{font-size:18px;color:var(--ink2);font-weight:500}
  .hero .sub{color:var(--ink2);font-size:12px;margin-top:2px}
  .badge{
    margin-top:10px;display:inline-flex;align-items:center;gap:6px;
    padding:5px 10px;border-radius:999px;font-size:11px;font-weight:600;
    background:rgba(52,211,153,.12);color:var(--ok);border:1px solid rgba(52,211,153,.25);
  }
  .badge.warn{background:rgba(251,191,36,.1);color:var(--warn);border-color:rgba(251,191,36,.25)}
  .badge.crit{background:rgba(248,113,113,.1);color:var(--crit);border-color:rgba(248,113,113,.25)}

  .bars{display:flex;flex-direction:column;gap:10px;margin-top:18px}
  .row{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
    transition:background .2s;
  }
  .row:hover{background:#161924}
  .row.active{border-color:#2c3142}
  .logo{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-weight:700;font-size:12px}
  .logo.oai{background:#10a37f;color:#001}
  .logo.ant{background:#d97757;color:#2a1305}
  .row .pname{font-weight:600;font-size:13px}
  .row .pmeta{font-size:11px;color:var(--ink3)}
  .track{height:6px;background:#1a1d26;border-radius:999px;overflow:hidden;position:relative}
  .fill{height:100%;border-radius:inherit;transition:width .6s cubic-bezier(.2,.8,.2,1), background .3s}
  .right{text-align:right;font-variant-numeric:tabular-nums}
  .right .v{font-weight:700}
  .right .v.ok{color:var(--ok)} .right .v.warn{color:var(--warn)} .right .v.crit{color:var(--crit)}
  .right .s{font-size:10px;color:var(--ink3)}

  .foot{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:10px;font-size:11px;color:var(--ink3)}
  .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:p 1.6s infinite}
  @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
  <div class="frame">
    <div class="head">
      <span class="title">QuotaBar</span>
      <span class="tag">· RUNWAY</span>
      <span class="spacer"></span>
      <button class="tab on" data-win="daily">Daily</button>
      <button class="tab" data-win="weekly">Weekly</button>
    </div>

    <div class="body">
      <div class="hero">
        <div class="top">
          <div class="big" id="big">—</div>
          <div class="unit" id="unit">left</div>
        </div>
        <div class="sub" id="sub">at current pace · across both providers</div>
        <div class="badge" id="badge">● On track</div>
      </div>

      <div class="bars" id="bars">
        <div class="row" data-prov="oai">
          <div class="logo oai">O</div>
          <div>
            <div class="pname">OpenAI</div>
            <div class="pmeta" data-meta>—</div>
            <div class="track" style="margin-top:6px"><div class="fill" data-fill></div></div>
          </div>
          <div class="right">
            <div class="v" data-pct>—</div>
            <div class="s" data-reset>—</div>
          </div>
        </div>
        <div class="row" data-prov="ant">
          <div class="logo ant">A</div>
          <div>
            <div class="pname">Anthropic</div>
            <div class="pmeta" data-meta>—</div>
            <div class="track" style="margin-top:6px"><div class="fill" data-fill></div></div>
          </div>
          <div class="right">
            <div class="v" data-pct>—</div>
            <div class="s" data-reset>—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="foot">
      <span class="dot"></span>
      <span>Live · last refresh 34s ago</span>
      <span class="spacer" style="flex:1"></span>
      <span>⌘R refresh · ⌘Q quit</span>
    </div>
  </div>

<script>
  const state = {
    win:'daily',
    daily:{ oai:{ pct:34, pace:+8 }, ant:{ pct:52, pace:-4 } },
    weekly:{ oai:{ pct:61, pace:+2 }, ant:{ pct:78, pace:-12 } },
  };

  const colorFor = p => p<50?'var(--ok)':p<75?'var(--warn)':'var(--crit)';
  const classFor = p => p<50?'ok':p<75?'warn':'crit';

  // "Runway" = projected time until the most-constrained provider hits 100%
  // at the current pace, approximated for the mock.
  function runway(win){
    const rate = win==='daily'
      ? { oai: 0.12, ant: 0.18 }   // %/min
      : { oai: 0.014, ant: 0.022 };// %/min
    const totalMin = win==='daily' ? 24*60 : 7*24*60;
    const remOai = (100 - state[win].oai.pct)/rate.oai;
    const remAnt = (100 - state[win].ant.pct)/rate.ant;
    const min = Math.min(remOai, remAnt);
    return { min, totalMin };
  }

  function fmt(min){
    if(min < 90) return { v: Math.round(min), u:'min' };
    if(min < 48*60) return { v:(min/60).toFixed(1).replace(/\.0$/,''), u:'hrs' };
    return { v:(min/1440).toFixed(1).replace(/\.0$/,''), u:'days' };
  }

  function render(){
    const d = state[state.win];
    const { min, totalMin } = runway(state.win);
    const { v, u } = fmt(min);
    document.getElementById('big').textContent = v;
    document.getElementById('unit').textContent = u + ' left';
    const ratio = min/totalMin;
    const badge = document.getElementById('badge');
    if(ratio > 0.5){ badge.className='badge'; badge.textContent='● On track'; }
    else if(ratio > 0.2){ badge.className='badge warn'; badge.textContent='● Burning fast'; }
    else { badge.className='badge crit'; badge.textContent='● Will run out'; }
    document.getElementById('sub').textContent =
      `at current pace · across both providers · ${state.win} window`;

    for(const p of ['oai','ant']){
      const row = document.querySelector(`[data-prov="${p}"]`);
      const pct = d[p].pct;
      row.querySelector('[data-fill]').style.width = pct+'%';
      row.querySelector('[data-fill]').style.background = colorFor(pct);
      const pv = row.querySelector('[data-pct]');
      pv.textContent = Math.round(pct)+'%';
      pv.className = 'v '+classFor(pct);
      row.querySelector('[data-reset]').textContent =
        state.win==='daily' ? 'resets 00:00' : 'resets Mon';
      row.querySelector('[data-meta]').textContent =
        (d[p].pace>=0?'+':'')+d[p].pace+' vs plan';
    }
  }

  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
      t.classList.add('on');
      state.win = t.dataset.win; render();
    });
  });
  render();
</script>
</body>
</html>
