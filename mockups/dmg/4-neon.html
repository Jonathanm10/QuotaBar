<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>QuotaBar DMG · Neon</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:#07060d;min-height:100vh;
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    color:#eef0f3;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:30px 16px;
  }
  .row{display:flex;gap:28px;align-items:center}
  .preview{display:flex;flex-direction:column;align-items:center;gap:8px}
  .preview small{color:#6b7280;font-size:11px;letter-spacing:.6px;text-transform:uppercase}
  .icon-lg{width:128px;height:128px;filter:drop-shadow(0 18px 28px rgba(123,80,255,.45))}

  .window{
    width:720px;height:468px;border-radius:12px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.6);
    border:1px solid rgba(255,255,255,.08);
  }
  .chrome{
    height:28px;background:linear-gradient(180deg,#16121e,#0e0c14);
    display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid #000;
  }
  .tl{width:12px;height:12px;border-radius:50%}
  .tl.r{background:#ff5f57}.tl.y{background:#febc2e}.tl.g{background:#28c840}
  .title{margin-left:10px;font-size:12px;color:#c0b5e0;font-weight:500}

  .stage{
    position:relative;width:100%;height:440px;overflow:hidden;
    background:
      radial-gradient(600px 320px at 18% 30%, rgba(123,80,255,.45), transparent 65%),
      radial-gradient(520px 260px at 85% 80%, rgba(0,230,255,.35), transparent 60%),
      radial-gradient(900px 500px at 50% 120%, rgba(255,70,170,.18), transparent 60%),
      #0a0716;
  }
  .grid{
    position:absolute;inset:0;opacity:.18;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);
    background-size:40px 40px;
    mask:radial-gradient(700px 400px at 50% 50%,#000 30%,transparent 90%);
  }

  .brand{
    position:absolute;top:22px;left:0;right:0;text-align:center;
  }
  .brand h1{
    margin:0;font:800 22px/1 "SF Pro Display",system-ui;letter-spacing:4px;text-transform:uppercase;
    background:linear-gradient(90deg,#00e6ff,#c084ff 50%,#ff4fa3);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .brand p{margin:6px 0 0;color:#9d93b7;font-size:12px;letter-spacing:1px;text-transform:uppercase}

  .slot{
    position:absolute;top:168px;width:180px;display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .slot.left{left:60px}.slot.right{right:60px}
  .cell{
    width:140px;height:140px;border-radius:26px;padding:14px;
    background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.1),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.14);position:relative;
    box-shadow:0 0 0 1px rgba(0,230,255,.2) inset,0 0 22px rgba(123,80,255,.35);
  }
  .slot.right .cell{box-shadow:0 0 0 1px rgba(255,79,163,.25) inset,0 0 22px rgba(255,79,163,.28)}
  .cell::before,.cell::after{
    content:"";position:absolute;width:14px;height:14px;border:1.5px solid #00e6ff;
  }
  .cell::before{top:-1px;left:-1px;border-right:0;border-bottom:0;border-top-left-radius:26px}
  .cell::after{bottom:-1px;right:-1px;border-left:0;border-top:0;border-bottom-right-radius:26px}
  .slot.right .cell::before,.slot.right .cell::after{border-color:#ff4fa3}
  .ic{width:112px;height:112px;display:block;margin:0 auto}
  .lbl{
    font-size:12px;color:#eef0f3;font-weight:600;letter-spacing:.4px;
    padding:5px 12px;border-radius:999px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  }

  .arrow-wrap{
    position:absolute;left:240px;top:212px;width:260px;height:60px;
  }
  .drag{
    position:absolute;left:50%;top:-16px;transform:translateX(-50%);
    color:#eaf3ff;font:700 11px/1 "SF Mono",ui-monospace,Menlo,monospace;letter-spacing:3px;
    text-transform:uppercase;
    padding:5px 10px;border-radius:6px;border:1px solid rgba(0,230,255,.6);
    background:rgba(0,230,255,.08);box-shadow:0 0 18px rgba(0,230,255,.35);
  }

  .foot{
    position:absolute;left:0;right:0;bottom:18px;text-align:center;
    color:#7b7594;font-size:11px;letter-spacing:.4px;
  }
  .foot b{color:#c5bde3;font-weight:500}
</style>
</head>
<body>

  <div class="row">
    <div class="preview">
      <svg class="icon-lg" viewBox="0 0 128 128">
        <defs>
          <linearGradient id="a4-body" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#1a1030"/><stop offset="1" stop-color="#070414"/>
          </linearGradient>
          <linearGradient id="a4-wave" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#00e6ff"/><stop offset=".5" stop-color="#c084ff"/>
            <stop offset="1" stop-color="#ff4fa3"/>
          </linearGradient>
          <radialGradient id="a4-orb" cx=".4" cy=".35" r=".7">
            <stop offset="0" stop-color="#ffffff" stop-opacity=".25"/>
            <stop offset=".6" stop-color="#ffffff" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#a4-body)"
              stroke="rgba(255,255,255,.08)"/>
        <circle cx="64" cy="64" r="40" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.12)"/>
        <path d="M24 68 Q40 44 64 64 T104 60" fill="none" stroke="url(#a4-wave)" stroke-width="5"
              stroke-linecap="round"/>
        <circle cx="64" cy="64" r="40" fill="url(#a4-orb)"/>
        <circle cx="104" cy="60" r="4.5" fill="#ff4fa3"/>
        <circle cx="24" cy="68" r="3.5" fill="#00e6ff"/>
      </svg>
      <small>Icon · 128</small>
    </div>

    <div class="window">
      <div class="chrome">
        <div class="tl r"></div><div class="tl y"></div><div class="tl g"></div>
        <div class="title">QuotaBar</div>
      </div>
      <div class="stage">
        <div class="grid"></div>

        <div class="brand">
          <h1>QuotaBar</h1>
          <p>drop · to · install</p>
        </div>

        <div class="slot left">
          <div class="cell">
            <svg class="ic" viewBox="0 0 128 128">
              <rect x="6" y="6" width="116" height="116" rx="28" fill="#120a24" stroke="rgba(255,255,255,.08)"/>
              <circle cx="64" cy="64" r="40" fill="rgba(255,255,255,.04)"/>
              <path d="M24 68 Q40 44 64 64 T104 60" fill="none" stroke="url(#a4-wave2)" stroke-width="5"
                    stroke-linecap="round"/>
              <defs>
                <linearGradient id="a4-wave2" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0" stop-color="#00e6ff"/><stop offset=".5" stop-color="#c084ff"/>
                  <stop offset="1" stop-color="#ff4fa3"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="lbl">QuotaBar.app</div>
        </div>

        <div class="slot right">
          <div class="cell">
            <svg class="ic" viewBox="0 0 128 128">
              <defs>
                <linearGradient id="fld4" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#c084ff"/><stop offset="1" stop-color="#6a3bd1"/>
                </linearGradient>
              </defs>
              <path d="M14 36 Q14 28 22 28 H50 L58 36 H106 Q114 36 114 44 V96 Q114 106 104 106 H24 Q14 106 14 96 Z"
                    fill="url(#fld4)"/>
              <path d="M14 50 H114 V96 Q114 106 104 106 H24 Q14 106 14 96 Z"
                    fill="rgba(255,255,255,.12)"/>
            </svg>
          </div>
          <div class="lbl">Applications</div>
        </div>

        <div class="arrow-wrap">
          <div class="drag">Drag →</div>
          <svg width="260" height="60" viewBox="0 0 260 60" style="position:absolute;inset:0">
            <defs>
              <linearGradient id="a4-line" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#00e6ff"/><stop offset="1" stop-color="#ff4fa3"/>
              </linearGradient>
              <filter id="a4-glow"><feGaussianBlur stdDeviation="2.5"/></filter>
            </defs>
            <path d="M4 36 L246 36" stroke="url(#a4-line)" stroke-width="2.5" filter="url(#a4-glow)"
                  stroke-linecap="round"/>
            <path d="M4 36 L246 36" stroke="url(#a4-line)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M234 26 L252 36 L234 46" fill="none" stroke="#ff4fa3" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="foot">v<b>0.1</b> · macOS 13+ · signed &amp; notarized · menu-bar only, no dock</div>
      </div>
    </div>
  </div>

</body>
</html>
