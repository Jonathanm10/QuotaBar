<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>QuotaBar DMG · Daylight</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:#0b0c10;min-height:100vh;
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    color:#eef0f3;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:30px 16px;
  }
  .row{display:flex;gap:28px;align-items:center}
  .preview{display:flex;flex-direction:column;align-items:center;gap:8px}
  .preview small{color:#6b7280;font-size:11px;letter-spacing:.6px;text-transform:uppercase}
  .icon-lg{width:128px;height:128px;filter:drop-shadow(0 18px 24px rgba(0,0,0,.35))}

  .window{
    width:720px;height:468px;border-radius:12px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.45);
    border:1px solid rgba(0,0,0,.12);
  }
  .chrome{
    height:28px;background:linear-gradient(180deg,#f3f3f5,#e4e5ea);
    display:flex;align-items:center;gap:8px;padding:0 12px;
    border-bottom:1px solid #c9cbd1;
  }
  .tl{width:12px;height:12px;border-radius:50%}
  .tl.r{background:#ff5f57}.tl.y{background:#febc2e}.tl.g{background:#28c840}
  .title{margin-left:10px;font-size:12px;color:#4a505c;font-weight:500}

  .stage{
    position:relative;width:100%;height:440px;overflow:hidden;color:#1b1f27;
    background:
      radial-gradient(900px 500px at 85% -10%, #eaf4ff 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 120%, #fff2e1 0%, transparent 55%),
      #fafaf7;
  }
  .linen{position:absolute;inset:0;opacity:.5;pointer-events:none;
    background-image:
      radial-gradient(rgba(0,0,0,.045) 1px,transparent 1px);
    background-size:4px 4px;mix-blend-mode:multiply}

  .brand{
    position:absolute;top:26px;left:0;right:0;text-align:center;
  }
  .brand h1{
    margin:0;font-size:22px;font-weight:700;letter-spacing:-.4px;color:#121620;
  }
  .brand p{margin:4px 0 0;font-size:13px;color:#626a7a}

  .slot{
    position:absolute;top:178px;width:180px;display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .slot.left{left:60px}.slot.right{right:60px}
  .ic{width:108px;height:108px;filter:drop-shadow(0 10px 18px rgba(30,40,60,.18))}
  .lbl{
    font-size:12px;color:#1b1f27;font-weight:600;
    padding:5px 12px;border-radius:999px;background:#fff;border:1px solid #e1e3ea;
  }

  /* arrow */
  .arrow{position:absolute;left:240px;top:212px;width:260px;height:48px;overflow:visible}
  .foot{
    position:absolute;left:0;right:0;bottom:22px;text-align:center;
    color:#7a8294;font-size:11px;letter-spacing:.3px;
  }
  .foot b{color:#39404e;font-weight:600}
  .pill{
    display:inline-block;background:#fff;border:1px solid #e1e3ea;border-radius:999px;
    padding:4px 10px;margin:0 4px;color:#39404e;font-size:11px;font-weight:500;
  }
</style>
</head>
<body>

  <div class="row">
    <div class="preview">
      <svg class="icon-lg" viewBox="0 0 128 128">
        <defs>
          <linearGradient id="a3-body" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eef0f4"/>
          </linearGradient>
        </defs>
        <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#a3-body)"
              stroke="#d7dae1"/>
        <rect x="24" y="80" width="10" height="28" rx="3" fill="#c7cdd8"/>
        <rect x="40" y="64" width="10" height="44" rx="3" fill="#ffa654"/>
        <rect x="56" y="48" width="10" height="60" rx="3" fill="#4deaba"/>
        <rect x="72" y="34" width="10" height="74" rx="3" fill="#5da7ff"/>
        <rect x="88" y="56" width="10" height="52" rx="3" fill="#ff7a7a"/>
        <path d="M22 40 L44 32 L66 38 L94 22" fill="none" stroke="#1b1f27" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="94" cy="22" r="4" fill="#1b1f27"/>
      </svg>
      <small>Icon · 128</small>
    </div>

    <div class="window">
      <div class="chrome">
        <div class="tl r"></div><div class="tl y"></div><div class="tl g"></div>
        <div class="title">QuotaBar</div>
      </div>
      <div class="stage">
        <div class="linen"></div>

        <div class="brand">
          <h1>Install QuotaBar</h1>
          <p>Drag the app into your Applications folder.</p>
        </div>

        <div class="slot left">
          <svg class="ic" viewBox="0 0 128 128">
            <rect x="6" y="6" width="116" height="116" rx="28" fill="#fff" stroke="#d7dae1"/>
            <rect x="24" y="80" width="10" height="28" rx="3" fill="#c7cdd8"/>
            <rect x="40" y="64" width="10" height="44" rx="3" fill="#ffa654"/>
            <rect x="56" y="48" width="10" height="60" rx="3" fill="#4deaba"/>
            <rect x="72" y="34" width="10" height="74" rx="3" fill="#5da7ff"/>
            <rect x="88" y="56" width="10" height="52" rx="3" fill="#ff7a7a"/>
            <path d="M22 40 L44 32 L66 38 L94 22" fill="none" stroke="#1b1f27" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="lbl">QuotaBar.app</div>
        </div>

        <div class="slot right">
          <svg class="ic" viewBox="0 0 128 128">
            <defs>
              <linearGradient id="fld3" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#7cc4ff"/><stop offset="1" stop-color="#3d86e0"/>
              </linearGradient>
            </defs>
            <path d="M14 36 Q14 28 22 28 H50 L58 36 H106 Q114 36 114 44 V96 Q114 106 104 106 H24 Q14 106 14 96 Z"
                  fill="url(#fld3)"/>
            <path d="M14 50 H114 V96 Q114 106 104 106 H24 Q14 106 14 96 Z"
                  fill="rgba(255,255,255,.15)"/>
          </svg>
          <div class="lbl">Applications</div>
        </div>

        <!-- thin pencil arrow -->
        <svg class="arrow" viewBox="0 0 260 48">
          <path d="M4 34 Q130 -6 246 24" fill="none" stroke="#39404e" stroke-width="1.5"
                stroke-linecap="round"/>
          <path d="M236 14 L250 24 L236 34" fill="none" stroke="#39404e" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <div class="foot">
          <span class="pill">macOS 13+</span>
          <span class="pill">Universal</span>
          <span class="pill">Signed &amp; notarized</span>
          <span class="pill">Menu-bar only</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
