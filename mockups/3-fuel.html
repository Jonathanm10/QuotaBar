<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>QuotaBar · Fuel</title>
<style>
  :root{
    --bg:#f4f5f7;--panel:#ffffff;--line:#e5e7eb;--line2:#eef0f3;
    --ink:#0b0d12;--ink2:#4b5563;--ink3:#9ca3af;
    --ok:#10b981;--warn:#f59e0b;--hot:#f97316;--crit:#ef4444;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(600px 400px at 90% 10%, #e8efff 0%, transparent 60%),
      radial-gradient(600px 400px at 0% 100%, #ffecd9 0%, transparent 55%),
      var(--bg);
    color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:32px;
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;
  }
  .frame{
    width:380px;border-radius:18px;overflow:hidden;
    background:var(--panel);border:1px solid var(--line);
    box-shadow:0 30px 60px rgba(15,23,42,.12), 0 1px 0 rgba(255,255,255,.9) inset;
  }
  .head{
    display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line2);
  }
  .title{font-weight:700;letter-spacing:-.2px}
  .lede{font-size:11px;color:var(--ink3);letter-spacing:.3px}
  .spacer{flex:1}
  .sw{
    display:inline-flex;background:#f3f4f6;border-radius:999px;padding:3px;gap:2px;border:1px solid var(--line);
  }
  .sw button{
    background:transparent;border:0;color:var(--ink2);font:inherit;font-size:12px;
    padding:4px 10px;border-radius:999px;cursor:pointer;
  }
  .sw button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}

  .body{padding:14px}
  .card{
    border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;
    background:linear-gradient(180deg,#fff, #fafbfd);
    position:relative;overflow:hidden;
  }
  .row1{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .logo{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-weight:800}
  .logo.oai{background:#10a37f;color:#fff}
  .logo.ant{background:#d97757;color:#fff}
  .name{font-weight:700;letter-spacing:-.1px}
  .sub{font-size:11px;color:var(--ink3)}
  .big{
    margin-left:auto;font-weight:800;font-size:22px;letter-spacing:-.8px;font-variant-numeric:tabular-nums;
  }
  .big .u{font-size:12px;color:var(--ink3);margin-left:2px;font-weight:600}
  .big.ok{color:var(--ok)} .big.warn{color:var(--warn)} .big.hot{color:var(--hot)} .big.crit{color:var(--crit)}

  .tank{
    height:22px;border-radius:8px;background:#f1f3f6;position:relative;overflow:hidden;
    border:1px solid var(--line);
  }
  .tank .lvl{
    height:100%;border-radius:inherit;
    background:linear-gradient(90deg, #10b981, #f59e0b 55%, #ef4444);
    width:0%;transition:width .7s cubic-bezier(.2,.8,.2,1);
    box-shadow:inset 0 -6px 10px rgba(0,0,0,.08);
    position:relative;
  }
  .tank .marks{position:absolute;inset:0;display:flex}
  .tank .marks span{
    flex:1;border-right:1px dashed rgba(0,0,0,.06);
  }
  .tank .marks span:last-child{border-right:0}
  .tank .cursor{
    position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--ink);
    transition:left .7s cubic-bezier(.2,.8,.2,1);transform:translateX(-1px);
    border-radius:2px;
  }
  .row2{display:flex;align-items:center;justify-content:space-between;margin-top:10px;font-size:11px;color:var(--ink2)}
  .pace{display:inline-flex;align-items:center;gap:6px;font-weight:600}
  .pace.ok{color:var(--ok)} .pace.warn{color:var(--warn)} .pace.hot{color:var(--hot)} .pace.crit{color:var(--crit)}
  .arrow{display:inline-block;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent}
  .arrow.up{border-bottom:6px solid currentColor}
  .arrow.dn{border-top:6px solid currentColor}

  .foot{
    padding:12px 16px;border-top:1px solid var(--line2);display:flex;align-items:center;
    font-size:11px;color:var(--ink3);gap:10px;
  }
  .dot{width:6px;height:6px;background:#6366f1;border-radius:50%;animation:p 1.6s infinite}
  @keyframes p{0%,100%{opacity:.35}50%{opacity:1}}
  .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#f3f4f6;border:1px solid var(--line);padding:1px 4px;border-radius:4px;font-size:10px}
</style>
</head>
<body>
  <div class="frame">
    <div class="head">
      <div>
        <div class="title">QuotaBar</div>
        <div class="lede">AI fuel · at a glance</div>
      </div>
      <span class="spacer"></span>
      <div class="sw" role="tablist" aria-label="window">
        <button class="on" data-win="daily">Daily</button>
        <button data-win="weekly">Weekly</button>
      </div>
    </div>

    <div class="body">
      <div class="card" data-prov="oai">
        <div class="row1">
          <div class="logo oai">O</div>
          <div>
            <div class="name">OpenAI</div>
            <div class="sub" data-sub>—</div>
          </div>
          <div class="big" data-big>—<span class="u">%</span></div>
        </div>
        <div class="tank">
          <div class="lvl" data-lvl></div>
          <div class="marks"><span></span><span></span><span></span><span></span></div>
          <div class="cursor" data-cursor></div>
        </div>
        <div class="row2">
          <span data-pace class="pace ok"><span class="arrow up"></span>on track</span>
          <span data-reset>resets in —</span>
        </div>
      </div>

      <div class="card" data-prov="ant">
        <div class="row1">
          <div class="logo ant">A</div>
          <div>
            <div class="name">Anthropic</div>
            <div class="sub" data-sub>—</div>
          </div>
          <div class="big" data-big>—<span class="u">%</span></div>
        </div>
        <div class="tank">
          <div class="lvl" data-lvl></div>
          <div class="marks"><span></span><span></span><span></span><span></span></div>
          <div class="cursor" data-cursor></div>
        </div>
        <div class="row2">
          <span data-pace class="pace ok"><span class="arrow up"></span>on track</span>
          <span data-reset>resets in —</span>
        </div>
      </div>
    </div>

    <div class="foot">
      <span class="dot"></span>
      <span>Updated 12s ago</span>
      <span class="spacer" style="flex:1"></span>
      <span><span class="kbd">⌘R</span> refresh</span>
    </div>
  </div>

<script>
  const data = {
    daily:{
      oai:{ pct:34, pace:+6,  sub:'5h window · OAuth', reset:'4h 10m' },
      ant:{ pct:72, pace:-8,  sub:'5h window · OAuth', reset:'2h 40m' },
    },
    weekly:{
      oai:{ pct:61, pace:+2,  sub:'rolling 7d · OAuth', reset:'3d 4h' },
      ant:{ pct:88, pace:-14, sub:'rolling 7d · OAuth', reset:'1d 9h' },
    }
  };
  let win='daily';

  const klass = p => p<50?'ok':p<75?'warn':p<90?'hot':'crit';
  const paceText = v => v>=0 ? 'banking reserve' : 'burning fast';
  const paceKlass = v => v>0 ? 'ok' : v<-10 ? 'crit' : 'warn';

  function render(){
    const d = data[win];
    for(const p of ['oai','ant']){
      const row = document.querySelector(`[data-prov="${p}"]`);
      const pct = d[p].pct;
      const k = klass(pct);
      row.querySelector('[data-lvl]').style.width = pct + '%';
      row.querySelector('[data-cursor]').style.left = pct + '%';
      const big = row.querySelector('[data-big]');
      big.innerHTML = Math.round(pct) + '<span class="u">%</span>';
      big.className = 'big ' + k;
      row.querySelector('[data-sub]').textContent = d[p].sub;
      row.querySelector('[data-reset]').textContent = 'resets in ' + d[p].reset;
      const pace = row.querySelector('[data-pace]');
      const pk = paceKlass(d[p].pace);
      pace.className = 'pace ' + pk;
      const dir = d[p].pace>=0 ? 'dn' : 'up';
      pace.innerHTML = `<span class="arrow ${dir}"></span>${paceText(d[p].pace)} (${d[p].pace>=0?'+':''}${d[p].pace}%)`;
    }
  }

  document.querySelectorAll('.sw button').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.sw button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); win = b.dataset.win; render();
    });
  });
  render();
</script>
</body>
</html>
