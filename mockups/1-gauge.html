<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>QuotaBar · Gauge</title>
<style>
  :root{
    --bg:#0e0f12;--panel:#16181d;--panel2:#1b1e24;--line:#24272f;
    --ink:#eef0f3;--ink2:#9ba2ad;--ink3:#6b7280;
    --ok:#22c55e;--warn:#f59e0b;--hot:#f97316;--crit:#ef4444;
    --accent:#60a5fa;
    --grid:rgba(255,255,255,.03);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 20% -10%, #1a2230 0%, transparent 60%),
      radial-gradient(1000px 500px at 100% 110%, #20172a 0%, transparent 55%),
      var(--bg);
    color:var(--ink);
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;
    display:grid;place-items:center;min-height:100vh;padding:32px;
  }
  .frame{
    width:380px;border-radius:16px;overflow:hidden;
    background:linear-gradient(180deg,#14161b 0%, #101217 100%);
    border:1px solid var(--line);
    box-shadow:0 30px 60px rgba(0,0,0,.55), 0 1px 0 rgba(255,255,255,.03) inset;
  }
  .head{
    display:flex;align-items:center;gap:10px;padding:12px 14px;
    border-bottom:1px solid var(--line);
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok)}
  .title{font-weight:600;letter-spacing:.2px}
  .spacer{flex:1}
  .btn{
    background:transparent;border:1px solid var(--line);color:var(--ink2);
    border-radius:8px;padding:5px 9px;font:inherit;font-size:12px;cursor:pointer;
    transition:.15s ease;
  }
  .btn:hover{color:var(--ink);border-color:#3a3f4a;background:#1b1e24}
  .btn.icon{padding:5px 7px}
  .body{padding:12px;display:flex;flex-direction:column;gap:10px}
  .card{
    background:linear-gradient(180deg,var(--panel) 0%, var(--panel2) 100%);
    border:1px solid var(--line);border-radius:12px;padding:12px;
    position:relative;overflow:hidden;
  }
  .card:before{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.4;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:22px 22px;
  }
  .brand{display:flex;align-items:center;gap:8px;margin-bottom:10px;position:relative}
  .logo{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:700}
  .logo.oai{background:#10a37f;color:#001}
  .logo.ant{background:#d97757;color:#2a1305}
  .brand .name{font-weight:600}
  .src{
    margin-left:auto;font-size:10px;letter-spacing:.6px;color:var(--ink3);
    border:1px solid var(--line);padding:2px 6px;border-radius:999px;
  }
  .gauges{display:grid;grid-template-columns:1fr 1px 1fr;gap:10px;position:relative}
  .sep{background:var(--line)}
  .gauge{display:flex;align-items:center;gap:10px}
  .ring{
    --p:0;--c:var(--ok);
    width:62px;height:62px;border-radius:50%;
    background:
      conic-gradient(var(--c) calc(var(--p)*1%), rgba(255,255,255,.07) 0);
    display:grid;place-items:center;position:relative;
    transition:background .6s ease;
  }
  .ring:after{
    content:"";position:absolute;inset:5px;border-radius:50%;
    background:linear-gradient(180deg,#13161b,#0f1116);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
  }
  .ring .pct{
    position:relative;z-index:1;font-weight:700;font-variant-numeric:tabular-nums;
    font-size:14px;letter-spacing:-.2px;
  }
  .meta{display:flex;flex-direction:column;gap:2px;min-width:0}
  .meta .label{font-size:11px;color:var(--ink2);letter-spacing:.3px;text-transform:uppercase}
  .meta .pace{font-weight:600;font-size:12px}
  .meta .reset{font-size:11px;color:var(--ink3);font-variant-numeric:tabular-nums}
  .ok{color:var(--ok)} .warn{color:var(--warn)} .hot{color:var(--hot)} .crit{color:var(--crit)}
  .foot{
    display:flex;align-items:center;gap:10px;padding:10px 14px;
    border-top:1px solid var(--line);color:var(--ink3);font-size:11px;
  }
  .pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:6px;
    animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  .legend{display:flex;gap:10px;margin-left:auto}
  .legend span{display:inline-flex;align-items:center;gap:4px}
  .legend i{width:8px;height:8px;border-radius:2px;display:inline-block}
  .caption{position:absolute;left:18px;right:18px;bottom:18px;color:var(--ink3);font-size:11px;text-align:center}
  .card:hover .ring{transform:scale(1.02)}
  .ring{transition:transform .2s ease, background .6s ease}
</style>
</head>
<body>
  <div class="frame" role="group" aria-label="QuotaBar menu">
    <div class="head">
      <span class="dot" title="Live"></span>
      <span class="title">QuotaBar</span>
      <span class="spacer"></span>
      <button class="btn icon" id="refresh" title="Refresh (⌘R)">↻</button>
      <button class="btn" id="cycle">Simulate</button>
    </div>

    <div class="body">
      <!-- OpenAI -->
      <div class="card" data-provider="oai">
        <div class="brand">
          <div class="logo oai">O</div>
          <div class="name">OpenAI</div>
          <div class="src">OAUTH</div>
        </div>
        <div class="gauges">
          <div class="gauge">
            <div class="ring" data-ring="daily"><span class="pct">0%</span></div>
            <div class="meta">
              <span class="label">Daily</span>
              <span class="pace ok" data-pace="daily">On track</span>
              <span class="reset" data-reset="daily">resets in —</span>
            </div>
          </div>
          <div class="sep"></div>
          <div class="gauge">
            <div class="ring" data-ring="weekly"><span class="pct">0%</span></div>
            <div class="meta">
              <span class="label">Weekly</span>
              <span class="pace ok" data-pace="weekly">On track</span>
              <span class="reset" data-reset="weekly">resets in —</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Anthropic -->
      <div class="card" data-provider="ant">
        <div class="brand">
          <div class="logo ant">A</div>
          <div class="name">Anthropic</div>
          <div class="src">OAUTH</div>
        </div>
        <div class="gauges">
          <div class="gauge">
            <div class="ring" data-ring="daily"><span class="pct">0%</span></div>
            <div class="meta">
              <span class="label">Daily</span>
              <span class="pace ok" data-pace="daily">On track</span>
              <span class="reset" data-reset="daily">resets in —</span>
            </div>
          </div>
          <div class="sep"></div>
          <div class="gauge">
            <div class="ring" data-ring="weekly"><span class="pct">0%</span></div>
            <div class="meta">
              <span class="label">Weekly</span>
              <span class="pace ok" data-pace="weekly">On track</span>
              <span class="reset" data-reset="weekly">resets in —</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="foot">
      <span><span class="pulse"></span>Updated just now</span>
      <span class="legend">
        <span><i style="background:var(--ok)"></i>ok</span>
        <span><i style="background:var(--warn)"></i>warn</span>
        <span><i style="background:var(--crit)"></i>crit</span>
      </span>
    </div>
  </div>

<script>
  const data = [
    { oai: { daily: 34, weekly: 61, dailyReset: 6.2*3600, weeklyReset: 3.1*86400 },
      ant: { daily: 52, weekly: 78, dailyReset: 5.7*3600, weeklyReset: 2.4*86400 }},
    { oai: { daily: 71, weekly: 84, dailyReset: 4.5*3600, weeklyReset: 2.7*86400 },
      ant: { daily: 88, weekly: 92, dailyReset: 3.2*3600, weeklyReset: 1.1*86400 }},
    { oai: { daily: 22, weekly: 44, dailyReset: 8.1*3600, weeklyReset: 4.2*86400 },
      ant: { daily: 18, weekly: 37, dailyReset: 9.4*3600, weeklyReset: 5.0*86400 }},
  ];
  let idx = 0;

  const colorFor = p =>
    p < 50 ? 'var(--ok)' :
    p < 75 ? 'var(--warn)' :
    p < 90 ? 'var(--hot)' :
            'var(--crit)';
  const classFor = p =>
    p < 50 ? 'ok' :
    p < 75 ? 'warn' :
    p < 90 ? 'hot' :
            'crit';
  const paceLabel = p =>
    p < 50 ? 'Deep reserve' :
    p < 75 ? 'On track' :
    p < 90 ? 'Burning fast' :
            'Will run out';

  const fmtDuration = s => {
    if(s<3600) return Math.round(s/60)+'m';
    if(s<86400) return (s/3600).toFixed(1).replace(/\.0$/,'')+'h';
    return (s/86400).toFixed(1).replace(/\.0$/,'')+'d';
  };

  function render(){
    const d = data[idx];
    for(const prov of ['oai','ant']){
      const card = document.querySelector(`[data-provider="${prov}"]`);
      for(const key of ['daily','weekly']){
        const val = d[prov][key];
        const ring = card.querySelector(`[data-ring="${key}"]`);
        ring.style.setProperty('--p', val);
        ring.style.setProperty('--c', colorFor(val));
        ring.querySelector('.pct').textContent = Math.round(val)+'%';
        const pace = card.querySelector(`[data-pace="${key}"]`);
        pace.className = 'pace ' + classFor(val);
        pace.textContent = paceLabel(val);
        const reset = card.querySelector(`[data-reset="${key}"]`);
        const secs = d[prov][key+'Reset'];
        reset.textContent = 'resets in ' + fmtDuration(secs);
      }
    }
  }
  document.getElementById('cycle').addEventListener('click', ()=>{
    idx = (idx+1) % data.length; render();
  });
  document.getElementById('refresh').addEventListener('click', ()=>{
    const el = document.getElementById('refresh');
    el.style.transition='transform .5s ease'; el.style.transform='rotate(360deg)';
    setTimeout(()=>{el.style.transition='none';el.style.transform='rotate(0deg)';},520);
  });
  render();
</script>
</body>
</html>
