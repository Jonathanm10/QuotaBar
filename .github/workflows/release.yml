name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      APP_NAME: QuotaBar

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install asc
        run: brew install asc

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$ASC_API_KEY_P8_BASE64" | base64 -d > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Validate ASC credentials
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          asc auth login \
            --local \
            --bypass-keychain \
            --name "quotabar-release" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer-id "$ASC_API_ISSUER_ID" \
            --private-key "$ASC_KEY_PATH" \
            --network
          asc auth doctor

      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          set -euo pipefail
          echo "$CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build and package app
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: ./Scripts/package_app.sh

      - name: Resolve signing identity
        run: |
          set -euo pipefail
          IDENTITY_SHA=$(security find-identity -v -p codesigning | awk '/Developer ID Application/{print $2; exit}')
          if [ -z "$IDENTITY_SHA" ]; then
            echo "No Developer ID Application identity found in keychain" >&2
            security find-identity -v -p codesigning >&2
            exit 1
          fi
          echo "SIGN_IDENTITY=$IDENTITY_SHA" >> "$GITHUB_ENV"

      - name: Sign app bundle
        run: |
          set -euo pipefail
          if [ -d "$APP_NAME.app/Contents/Frameworks" ]; then
            while IFS= read -r -d '' framework; do
              codesign \
                --force \
                --deep \
                --options runtime \
                --timestamp \
                --sign "$SIGN_IDENTITY" \
                "$framework"
            done < <(find "$APP_NAME.app/Contents/Frameworks" -name "*.framework" -type d -print0)
          fi
          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "$SIGN_IDENTITY" \
            "$APP_NAME.app/Contents/MacOS/$APP_NAME"
          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "$SIGN_IDENTITY" \
            "$APP_NAME.app"
          codesign --verify --deep --strict --verbose=2 "$APP_NAME.app"
          codesign -dvvv "$APP_NAME.app" 2>&1 | grep -E "Authority|TeamIdentifier|Identifier"

      - name: Notarize and staple app bundle
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          APP_ZIP="$RUNNER_TEMP/$APP_NAME.zip"
          /usr/bin/ditto -c -k --keepParent "$APP_NAME.app" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --key "$ASC_KEY_PATH" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP_NAME.app"
          xcrun stapler validate "$APP_NAME.app"
          rm -f "$APP_ZIP"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./Scripts/create_dmg.sh

      - name: Resolve DMG path
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          echo "DMG=$APP_NAME-$VERSION.dmg" >> "$GITHUB_ENV"

      - name: Sign DMG
        run: |
          codesign --force --timestamp --sign "$SIGN_IDENTITY" "$DMG"
          codesign --verify --verbose=2 "$DMG"

      - name: Notarize DMG
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          xcrun notarytool submit "$DMG" \
            --key "$ASC_KEY_PATH" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Generate Sparkle appcast
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: ./Scripts/generate_appcast.sh

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" appcast.xml --clobber
          else
            gh release create "$TAG" "$DMG" appcast.xml \
              --title "$TAG" \
              --generate-notes
          fi

      - name: Clean up secrets
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true
          rm -f "$RUNNER_TEMP/AuthKey.p8" || true
